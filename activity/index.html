<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <!-- interactive-widget=overlays-content: when the Android soft keyboard
             opens, overlay it on top of the page instead of resizing either
             viewport. This stops the layout from reflowing mid-animation, which
             on Android WebView (Discord's mobile client) stole focus from the
             guess input and dismissed the keyboard on the very first tap. The
             browser still scrolls the focused input into the visible area. -->
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, interactive-widget=overlays-content"
        />
        <link
            rel="preconnect"
            href="https://fonts.googleapis.com"
            crossorigin
        />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <title>KMQ</title>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
